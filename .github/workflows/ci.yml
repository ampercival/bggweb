name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "ci-not-secret"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Verify migrations are up to date
        run: python manage.py makemigrations games --check --dry-run

      - name: Run tests
        run: python manage.py test games --verbosity=2
